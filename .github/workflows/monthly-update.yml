name: Monthly Fund Update

on:
  schedule:
    - cron: '0 6 1 * *'   # 6:00 AM UTC on the 1st of every month
  workflow_dispatch:        # allow manual trigger from GitHub for testing

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run monthly update script
        run: node update.js

      - name: Commit and push changes
        run: |
          git config user.name "Family Fund Bot"
          git config user.email "noreply@github.com"
          git add state.json index.html
          git diff --staged --quiet || git commit -m "Auto: add new month obligations"
          git push
